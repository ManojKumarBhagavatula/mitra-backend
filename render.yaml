services:
  - type: web
    name: mitra-chatbot-api
    runtime: python
    pythonVersion: "3.12.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false